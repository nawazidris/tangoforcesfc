<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Tango Football Club</title>
    <link rel="stylesheet" href="css/gallery.css">
</head>
<body>

<header>
    <div class="header-top">
        <h1>Tango Football Club</h1>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="roster.html">Player Roster</a></li>
            <li><a href="matches.html">Matches</a></li>
            <li><a href="history.html">Club History</a></li>
            <li><a href="videos.html">Videos</a></li>
            <li><a href="gallery.html">Gallery</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="gallery-header">
        <h2 id="galleryTitle">Club Gallery</h2>
        <p id="galleryDescription">Photos from matches and team events</p>
    </section>

    <!-- FILTERS -->
    <div class="gallery-filters">
        <button onclick="filterGallery('all')">All</button>
        <button onclick="filterGallery('matchday')">Matchday</button>
        <button onclick="filterGallery('champions')">Champions</button>
        <button onclick="filterGallery('newseason')">2026 Season</button>
    </div>

    <div class="gallery-container">

        <!-- Matchday -->
        <div class="subsection">
            <h3 class="subsection-title">Matchday Pictures</h3>
            <div class="gallery-grid" id="matchdayPicturesGrid"></div>
        </div>

        <!-- Champions -->
        <div class="subsection">
            <h3 class="subsection-title">2025/26 MOSSL Champions</h3>
            <div class="gallery-grid" id="celebrationsPicturesGrid"></div>
        </div>

        <!-- 2026 Season -->
        <div class="subsection">
            <h3 class="subsection-title">2026 Season</h3>
            <div class="gallery-grid" id="newseasonPicturesGrid"></div>
        </div>

    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" onclick="closeLightbox()">
        <img id="lightboxImage">
    </div>

</main>

<footer>
    <p>&copy; 2026 Tango Football Club</p>
</footer>

<script src="js/gallery.js"></script>
</body>
</html>
