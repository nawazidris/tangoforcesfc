<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Tango Football Club</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>

<header>
    <div class="header-top">
        <h1>Tango Football Club</h1>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="roster.html">Player Roster</a></li>
            <li><a href="matches.html">Matches</a></li>
            <li><a href="history.html">Club History</a></li>
            <li><a href="videos.html">Videos</a></li>
            <li><a href="gallery.html" class="active">Gallery</a></li>
        </ul>
    </nav>
</header>

<main>

    <section class="gallery-header">
        <h2>Club Gallery</h2>
        <p>Photos from matches and team events</p>
    </section>

    <!-- FILTER BUTTONS -->
    <div class="gallery-filters">
        <button onclick="filterGallery(event,'all')" class="active">All</button>
        <button onclick="filterGallery(event,'matchday')">Matchday</button>
        <button onclick="filterGallery(event,'champions')">Champions</button>
        <button onclick="filterGallery(event,'newseason')">2026 Season</button>
    </div>

    <div class="gallery-container">

        <div class="subsection">
            <h3>Matchday Pictures</h3>
            <div class="gallery-grid" id="matchdayPicturesGrid"></div>
        </div>

        <div class="subsection">
            <h3>2025/26 MOSSL Champions</h3>
            <div class="gallery-grid" id="celebrationsPicturesGrid"></div>
        </div>

        <div class="subsection">
            <h3>2026 Season</h3>
            <div class="gallery-grid" id="newseasonPicturesGrid"></div>
        </div>

    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox">
        <span class="close-btn" onclick="closeLightbox()">✖</span>
        <img id="lightboxImage">
    </div>

</main>

<footer>
    <p>&copy; 2026 Tango Football Club</p>
</footer>

<script src="js/gallery.js"></script>
</body>
</html>
