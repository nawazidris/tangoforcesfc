<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login - Tango FC</title>
<style>
  body { font-family: Arial; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f5f5f5; }
  form { background: #fff; padding: 30px; border-radius: 10px; box-shadow: 0 0 15px rgba(0,0,0,0.1); width: 300px; }
  input { display: block; margin: 10px 0; padding: 8px; width: 100%; }
  button { padding: 10px; width: 100%; cursor: pointer; }
  p { color: red; font-size: 0.9rem; }
</style>
</head>
<body>
<form id="loginForm">
  <h2>Admin Login</h2>
  <input type="text" id="username" placeholder="Username" required>
  <input type="password" id="password" placeholder="Password" required>
  <button type="submit">Login</button>
  <p id="error"></p>
</form>

<script>
  const credentials = { username: 'admin', password: 'StrongPass123' };

  document.getElementById('loginForm').addEventListener('submit', e => {
    e.preventDefault();
    const user = document.getElementById('username').value;
    const pass = document.getElementById('password').value;

    if(user === credentials.username && pass === credentials.password) {
      sessionStorage.setItem('adminToken', btoa(user + ':' + pass));
      window.location.href = 'admin.html';
    } else {
      document.getElementById('error').textContent = 'Incorrect username or password';
    }
  });
</script>
</body>
</html>
