<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tango FC Admin Login</title>
<link rel="stylesheet" href="css/login.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<div class="login-card">
    <div class="header-brand">
        <img src="images/tangoforces.jpg" alt="Tango Forces Logo" class="header-logo">
        <h1>Tango Football Club</h1>
    </div>

    <h2>Admin Login</h2>

    <form id="loginForm">
        <div class="input-group">
            <i class="fas fa-user"></i>
            <input type="text" id="username" placeholder="Username" required>
        </div>
        <div class="input-group">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" placeholder="Password" required>
        </div>
        <button type="submit">Login</button>
        <p id="error"></p>
    </form>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();
    const user = document.getElementById("username").value;
    const pass = document.getElementById("password").value;

    if(user === "admin" && pass === "tango123"){
        sessionStorage.setItem("adminToken", "tango_secure_admin");
        window.location.href = "admin.html";
    } else {
        document.getElementById("error").innerText = "Invalid username or password";
    }
});
</script>

</body>
</html>
