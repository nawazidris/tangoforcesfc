<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tango FC Admin Access</title>

<style>
body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f5f5f5;
}

form{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
width:320px;
}

h2{
text-align:center;
margin-bottom:20px;
}

input{
display:block;
margin:10px 0;
padding:10px;
width:100%;
border:1px solid #ccc;
border-radius:6px;
}

button{
padding:10px;
width:100%;
background:#111;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#333;
}

p{
color:red;
font-size:0.9rem;
text-align:center;
}
</style>

</head>

<body>

<form id="loginForm">

<h2>Admin Login</h2>

<input type="text" id="username" placeholder="Username" required>

<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>

<p id="error"></p>

</form>

<script>

/* auto skip login if already logged in */

if(sessionStorage.getItem("adminToken")){
window.location.href="admin.html";
}

const credentials={username:"admin",password:"StrongPass123"};

const MAX_ATTEMPTS=5;

document.getElementById("loginForm").addEventListener("submit",e=>{

e.preventDefault();

let attempts=localStorage.getItem("loginAttempts")||0;

if(attempts>=MAX_ATTEMPTS){

document.getElementById("error").textContent=
"Too many login attempts. Try again later.";

return;

}

const user=document.getElementById("username").value;
const pass=document.getElementById("password").value;

if(user===credentials.username && pass===credentials.password){

sessionStorage.setItem("adminToken",btoa(user+":"+pass));

sessionStorage.setItem("adminExpiry",Date.now()+(60*60*1000));

localStorage.removeItem("loginAttempts");

window.location.href="admin.html";

}else{

attempts++;

localStorage.setItem("loginAttempts",attempts);

document.getElementById("error").textContent=
"Incorrect username or password ("+attempts+"/5)";

}

});

</script>

</body>
</html>
