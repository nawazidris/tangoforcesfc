<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tango FC Admin Login</title>

<style>
body{
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:#f4f4f4;
}

form{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 0 15px rgba(0,0,0,0.1);
width:320px;
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border-radius:6px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
border:none;
background:#111;
color:white;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#333;
}

#error{
color:red;
text-align:center;
font-size:0.9rem;
}
</style>
</head>

<body>

<form id="loginForm">
<h2>Admin Login</h2>

<input type="text" id="username" placeholder="Username" required>
<input type="password" id="password" placeholder="Password" required>

<button type="submit">Login</button>
<p id="error"></p>
</form>

<script>
const credentials = {
username: "admin",
password: "StrongPass123"
};

document.getElementById("loginForm").addEventListener("submit", function(e){
e.preventDefault();

const user = document.getElementById("username").value;
const pass = document.getElementById("password").value;

if(user === credentials.username && pass === credentials.password){

sessionStorage.setItem("adminToken", "logged_in");
sessionStorage.setItem("adminExpiry", Date.now() + (60 * 60 * 1000));

window.location.href = "admin.html";

}else{
document.getElementById("error").textContent = "Invalid login details.";
}
});
</script>

</body>
</html>
