<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Stats</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <div class="header-top">
            <div class="header-brand">
                <img src="images/tangoforces.jpg" alt="Tango Forces Logo" class="header-logo">
                <h1>Tango Football Club</h1>
            </div>
        </div>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
            <li><a href="technical-team.html">Technical Team</a></li>
            <li><a href="roster.html">Roster</a></li>
            <li><a href="matches.html">Matches</a></li>
            <li><a href="stats.html">Stats</a></li>
            <li><a href="league-standings.html">Standings</a></li>
            <li><a href="history.html">History</a></li>
            <li><a href="videos.html">Videos</a></li>
            <li><a href="gallery.html" class="active">Gallery</a></li>
            </ul>
        </nav>
    </header>
    <main>
        <section class="stats-overview">
            <div class="stats-summary-cards">
                <div class="summary-card">
                    <span class="summary-label">Matches Played</span>
                    <strong id="summaryMatches">0</strong>
                </div>
                <div class="summary-card">
                    <span class="summary-label">Goals Scored</span>
                    <strong id="summaryGoalsFor">0</strong>
                </div>
                <div class="summary-card">
                    <span class="summary-label">Goals Conceded</span>
                    <strong id="summaryGoalsAgainst">0</strong>
                </div>
                <div class="summary-card">
                    <span class="summary-label">Goal Difference</span>
                    <strong id="summaryGoalDiff">0</strong>
                </div>
            </div>
        </section>

                <section class="top-scorers">
            <h2>Top Scorers</h2>
            <div class="top-scorers-cards" id="topScorersContainer"></div>
        </section>

        <section class="stats-chart">
            <h2>Goals vs Assists</h2>
            <div class="chart-card" id="goalsAssistsChart"></div>
        </section>

        <section id="stats-section">
            <h2>Statistics Overview</h2>
            <div class="table-responsive">
                <table id="stats-table">
                    <thead>
                        <tr>
                            <th>Player Name</th>
                            <th>Position</th>
                            <th>Goals</th>
                            <th>Assists</th>
                                                   </tr>
                    </thead>
                    <tbody>
                        <!-- Player stats will be populated here -->
                    </tbody>
                </table>
            </div>
        </section>

    </main>
    <script src="js/theme.js"></script>
    <script src="js/stats.js"></script>
</body>
</html>
