<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tango FC Admin Panel</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
body{margin:0;font-family:Arial;background:#f4f6f9;}
.admin-wrapper{display:flex;height:100vh;}
.sidebar{width:220px;background:#837694;color:#fff;padding:20px;}
.sidebar h2{text-align:center;}
.sidebar button{width:100%;padding:10px;margin:10px 0;border:none;background:#222;color:white;cursor:pointer;border-radius:6px;}
.sidebar button:hover{background:#444;}
.logout{background:red;}
.main{flex:1;padding:20px;overflow-y:auto;}
.card{background:white;padding:15px;border-radius:10px;margin-bottom:15px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
input, select{width:100%;padding:10px;margin:8px 0;border-radius:6px;border:1px solid #ccc;}
button.save{background:#111;color:white;padding:10px;border:none;width:100%;border-radius:6px;cursor:pointer;}
button.save:hover{background:#333;}
.event{background:#eee;padding:6px;margin:5px 0;border-radius:5px;}
</style>
</head>
<body>

<div class="admin-wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
<h2>Tango Admin</h2>
<button onclick="showTab('players')"><i class="fa fa-users"></i> Players</button>
<button onclick="showTab('matches')"><i class="fa fa-futbol"></i> Matches</button>
<button class="logout" onclick="logout()"><i class="fa fa-sign-out"></i> Logout</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- PLAYERS -->
<div id="playersTab" class="tab">
<div class="card">
<h3>Add Player</h3>
<form id="playerForm">
<input type="hidden" id="playerId">
<input id="playerName" placeholder="Player Name" required>
<input id="playerGoals" type="number" placeholder="Goals">
<input id="playerAssists" type="number" placeholder="Assists">
<button type="submit" class="save">Save Player</button>
</form>
</div>

<div class="card">
<h3>Players List</h3>
<div id="playersList"></div>
</div>
</div>

<!-- MATCHES -->
<div id="matchesTab" class="tab" style="display:none">
<div class="card">
<h3>Add Match</h3>
<form id="matchForm">
<input type="hidden" id="matchId">
<input id="homeTeam" placeholder="Home Team" required>
<input id="awayTeam" placeholder="Away Team" required>
<input type="date" id="matchDate" required>
<input type="time" id="matchTime">
<input id="matchVenue" placeholder="Venue">
<select id="matchStatus">
<option value="upcoming">Upcoming</option>
<option value="completed">Completed</option>
</select>
<input type="number" id="homeScore" placeholder="Home Score">
<input type="number" id="awayScore" placeholder="Away Score">

<h4>Match Events</h4>
<select id="eventPlayer"></select>
<select id="eventType">
<option value="goal">Goal ⚽</option>
<option value="assist">Assist 🎯</option>
<option value="yellow_card">Yellow 🟨</option>
<option value="red_card">Red 🟥</option>
</select>
<select id="eventTeam">
<option value="home">Home</option>
<option value="away">Away</option>
</select>
<input id="eventMinute" placeholder="Minute">
<button type="button" onclick="addEvent()">Add Event</button>
<div id="eventList"></div>

<button type="submit" class="save">Save Match</button>
</form>
</div>

<div class="card">
<h3>Matches List</h3>
<div id="matchesList"></div>
</div>
</div>

</div>
</div>

<script src="admin.js"></script>
<script>
function showTab(tab){
document.getElementById("playersTab").style.display = tab==="players"?"block":"none";
document.getElementById("matchesTab").style.display = tab==="matches"?"block":"none";
}
</script>
</body>
</html>
