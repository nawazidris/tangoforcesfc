<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tango FC Admin</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<script>
const token = sessionStorage.getItem('adminToken');
const validToken = btoa('admin:StrongPass123');

if(token !== validToken){
window.location.href = 'login.html';
}
</script>

<header>
<h1>Tango FC Admin Panel</h1>
<button onclick="logout()">Logout</button>
</header>

<main>

<h2>Admin Dashboard</h2>

<div class="admin-tabs">

<button onclick="openTab('players')">Players</button>
<button onclick="openTab('matches')">Matches</button>
<button onclick="openTab('stats')">Stats</button>

</div>

<!-- PLAYERS TAB -->

<section id="players" class="tab">

<h3>Add Player</h3>

<form id="playerForm">

<input type="hidden" id="playerId">

<input type="text" id="playerName" placeholder="Name" required>

<input type="text" id="playerNickname" placeholder="Nickname">

<select id="playerPosition">
<option>Forward</option>
<option>Midfielder</option>
<option>Defender</option>
<option>Goalkeeper</option>
</select>

<input type="number" id="playerNumber" placeholder="Jersey Number">

<input type="number" id="playerGoals" placeholder="Goals">

<input type="number" id="playerAssists" placeholder="Assists">

<button type="submit">Save Player</button>

</form>

<h3>Players</h3>
<div id="playersList"></div>

</section>

<!-- MATCHES TAB -->

<section id="matches" class="tab" style="display:none">

<h3>Add Match</h3>

<form id="matchForm">

<input type="hidden" id="matchId">

<input type="text" id="homeTeam" placeholder="Home Team" required>

<input type="text" id="awayTeam" placeholder="Away Team" required>

<input type="date" id="matchDate">

<input type="time" id="matchTime">

<input type="text" id="matchVenue" placeholder="Venue">

<select id="matchStatus">
<option value="upcoming">Upcoming</option>
<option value="completed">Completed</option>
<option value="postponed">Postponed</option>
</select>

<input type="number" id="homeScore" placeholder="Home Score">

<input type="number" id="awayScore" placeholder="Away Score">

<button type="submit">Save Match</button>

</form>

<h3>Match Events</h3>

<select id="eventTeam">
<option value="home">Home</option>
<option value="away">Away</option>
</select>

<select id="eventType">
<option value="goal">Goal</option>
<option value="assist">Assist</option>
<option value="yellow">Yellow Card</option>
<option value="red">Red Card</option>
</select>

<input type="text" id="eventPlayer" placeholder="Player">

<input type="number" id="eventMinute" placeholder="Minute">

<button onclick="addMatchEvent()">Add Event</button>

<div id="eventsList"></div>

<h3>Matches</h3>
<div id="matchesList"></div>

</section>

<!-- STATS TAB -->

<section id="stats" class="tab" style="display:none">

<h3>Club Stats</h3>

<div>Total Players: <span id="totalPlayers"></span></div>

<div>Total Goals: <span id="totalGoals"></span></div>

<div>Total Assists: <span id="totalAssists"></span></div>

<div>Upcoming Matches: <span id="upcomingMatches"></span></div>

</section>

</main>

<script src="js/admin.js"></script>

<script>

function logout(){
sessionStorage.removeItem('adminToken');
window.location.href='login.html';
}

function openTab(tab){

document.querySelectorAll('.tab').forEach(t=>{
t.style.display='none'
})

document.getElementById(tab).style.display='block'

}

</script>

</body>
</html>
