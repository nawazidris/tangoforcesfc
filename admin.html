<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tango Forces FC Admin</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/admin.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="admin-page">

<div class="admin-wrapper">

<!-- SIDEBAR -->

<aside class="admin-sidebar">

<h2 class="club-name">Tango Forces</h2>

<button class="admin-tab-btn active" data-tab="dashboard">
<i class="fa fa-chart-line"></i> Dashboard
</button>

<button class="admin-tab-btn" data-tab="players">
<i class="fa fa-users"></i> Players
</button>

<button class="admin-tab-btn" data-tab="matches">
<i class="fa fa-futbol"></i> Matches
</button>

<button class="admin-tab-btn" data-tab="stats">
<i class="fa fa-chart-bar"></i> Stats
</button>

<button onclick="logout()" class="logout-btn">
<i class="fa fa-sign-out"></i> Logout
</button>

</aside>

<!-- MAIN -->

<div class="admin-main">

<header class="admin-topbar">

<h1>Admin Dashboard</h1>

</header>

<main class="admin-content">

<!-- DASHBOARD -->

<section id="dashboard-tab" class="admin-tab active">

<div class="dashboard-cards">

<div class="card">
<h3>Total Players</h3>
<p id="totalPlayers">0</p>
</div>

<div class="card">
<h3>Total Matches</h3>
<p id="totalMatches">0</p>
</div>

<div class="card">
<h3>Upcoming Matches</h3>
<p id="upcomingMatches">0</p>
</div>

</div>

</section>

<!-- PLAYERS -->

<section id="players-tab" class="admin-tab">

<h2>Manage Players</h2>

<form id="playerForm" class="admin-form">

<input type="hidden" id="playerId">

<input type="text" id="playerName" placeholder="Player Name" required>

<input type="text" id="playerNickname" placeholder="Nickname">

<select id="playerPosition">
<option>Forward</option>
<option>Midfielder</option>
<option>Defender</option>
<option>Goalkeeper</option>
</select>

<input type="number" id="playerNumber" placeholder="Jersey Number">

<input type="number" id="playerGoals" placeholder="Goals">

<input type="number" id="playerAssists" placeholder="Assists">

<input type="text" id="playerImage" placeholder="Image URL">

<button type="submit" class="btn-save">
<i class="fa fa-save"></i> Save Player
</button>

</form>

<div id="playersList" class="admin-list"></div>

</section>

<!-- MATCHES -->

<section id="matches-tab" class="admin-tab">

<h2>Manage Matches</h2>

<form id="matchForm" class="admin-form">

<input type="hidden" id="matchId">

<input type="text" id="homeTeam" placeholder="Home Team">

<input type="text" id="awayTeam" placeholder="Away Team">

<input type="date" id="matchDate">

<input type="time" id="matchTime">

<input type="text" id="matchVenue" placeholder="Venue">

<select id="matchStatus">
<option value="upcoming">Upcoming</option>
<option value="completed">Completed</option>
</select>

<input type="number" id="homeScore" placeholder="Home Score">

<input type="number" id="awayScore" placeholder="Away Score">

<button type="submit" class="btn-save">
<i class="fa fa-save"></i> Save Match
</button>

</form>

<div id="matchesList" class="admin-list"></div>

</section>

<!-- STATS -->

<section id="stats-tab" class="admin-tab">

<h2>Update Player Stats</h2>

<select id="statPlayerSelect"></select>

<button onclick="updatePlayerStats()" class="btn-save">
Update Stats
</button>

</section>

</main>

</div>

</div>

<script src="js/admin.js"></script>

</body>
</html>
