<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tango FC Admin Panel</title>

<style>
body{
font-family:Arial;
margin:0;
background:#f2f2f2;
}

header{
background:#111;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

button{
padding:8px 12px;
border:none;
border-radius:5px;
cursor:pointer;
}

.container{
padding:20px;
}

.admin-list-item{
background:white;
padding:10px;
margin:10px 0;
display:flex;
justify-content:space-between;
border-radius:6px;
}

.btn-edit{background:#3498db;color:white;}
.btn-delete{background:#e74c3c;color:white;}
</style>
</head>

<body>

<header>
<h1>Tango FC Admin Panel</h1>
<div>
<button onclick="goHome()">Home</button>
<button onclick="logout()">Logout</button>
</div>
</header>

<div class="container">

<h2>Players</h2>
<div id="playersList"></div>

<h2>Matches</h2>
<div id="matchesList"></div>

</div>

<script src="admin.js"></script>

</body>
</html>
