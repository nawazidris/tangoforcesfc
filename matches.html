<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matches & Fixtures - Tango Football Club</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>

    :root {
    --primary: #002b5c;
    --accent: #0ea5e9;
    --background: #ffffff;

    /* 🔥 FIX: ADD MISSING VARIABLES */
    --header-bg: rgba(0, 43, 92, 0.95);
    --header-text: #ffffff;
    --nav-hover: rgba(14, 165, 233, 0.2);
}

/* DARK MODE */

body.dark-mode {
    --bg-color: #0f172a;
    --text-color: #f1f5f9;
    --card-bg: #1e293b;
    --goal-color: #22c55e;
    --yellow-card: #facc15;
    --red-card: #ef4444;
}

:root[data-theme="light"] {
    --bg-color: #ffffff;
    --text-color: #0b1724;
    --card-bg: #ffffff;
    --header-bg: #002b4f;
    --header-text: #ffffff;
    --nav-hover: #001f3a;
    --secondary-bg: #f0f4f8;
}

:root[data-theme="dark"] {
    --bg-color: #0b0f14;
    --text-color: #e6eef6;
    --card-bg: #0f1720;
    --header-bg: #00131f;
    --header-text: #e6eef6;
    --nav-hover: #003a66;
    --secondary-bg: #0b1220;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    scroll-behavior: smooth;
}
/* ===== BODY ===== */
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;

    transition: background-color 0.3s, color 0.3s;
    letter-spacing: -0.3px;

    color: var(--text-color);
    background-color: var(--bg-color);
}



/* ===== HEADER ===== */
header {
    position: sticky;
    z-index: 100;
    top: 0;

    color: var(--header-text);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    background-color: var(--header-bg);

    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
}

.header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;

    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 20px;
}

.header-top h1 {
    font-size: 20px;
    font-weight: 600;
}

nav {
    padding: 0 20px 10px 20px;
}



nav ul {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;

    max-width: 1200px;
    margin: 0 auto;

    list-style: none;

    gap: 25px;
}

nav ul li {
    margin-right: 15px;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

nav ul li a:hover {
    text-decoration: underline;
}

/* ===== MATCHES HEADER ===== */
.matches-header {
    text-align: center;
    padding: 20px;
}

.matches-header h2 {
    font-size: 28px;
}

.matches-header p {
    font-size: 16px;
    color: #555;
}

.season-badge span {
    background: #5903c9;
    color: white;
    padding: 5px 12px;
    border-radius: 15px;
    font-weight: bold;
}

/* ===== FILTER BUTTONS ===== */
.matches-filters {
    text-align: center;
    margin-bottom: 20px;
}

.matches-filters button {
    margin: 5px;
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #5903c9;
    color: white;
    font-weight: bold;
}

.matches-filters button.active {
    background: #555;
}

.matches-filters button:hover {
    background: #555;
}

/* ===== MATCH CARDS ===== */
.matches-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 12px;
    padding: 0 12px 30px;
    max-width: 1200px;
    margin: 0 auto;
}

.match-card {
    background: var(--card-bg);
    border: 1px solid rgba(14, 165, 233, 0.15);
    width: 100%;
    border-radius: 14px;
    box-shadow: 0 2px 8px rgba(15, 23, 42, 0.05);
    padding: 12px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.match-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 16px rgba(15, 23, 42, 0.1);
}

.match-card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
    padding-bottom: 8px;
    border-bottom: 1px solid rgba(14, 165, 233, 0.1);
}

.match-date {
    font-weight: 600;
    color: var(--text-color);
    font-size: 0.85rem;
}

.match-status {
    text-transform: uppercase;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    padding: 4px 8px;
    border-radius: 999px;
    color: white;
    background: #2563eb;
}

.match-status.completed {
    display: none;
}

.match-status.upcoming {
    background: #2563eb;
}

.match-teams {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 10px;
}

.team {
    flex: 1;
    padding: 8px 10px;
    border-radius: 10px;
    background: rgba(14, 165, 233, 0.06);
    text-align: center;
    min-width: 0;
}

.team-name {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text-color);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.match-score {
    font-size: 1.2rem;
    font-weight: 700;
    text-align: center;
    color: #002b5c;
    min-width: 60px;
}

.match-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    color: #64748b;
    font-size: 0.8rem;
    margin-bottom: 10px;
}

.match-meta span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    background: rgba(14, 165, 233, 0.06);
    padding: 4px 8px;
    border-radius: 6px;
}

.match-events-row {
    border-top: 1px solid rgba(14, 165, 233, 0.1);
    padding-top: 8px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
}

.team-events {
    display: flex;
    flex-direction: column;
    gap: 3px;
}

.team-events:empty {
    display: none;
}

.team-events-header {
    font-size: 0.75rem;
    font-weight: 600;
    color: #2563eb;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 2px;
    display: none;
}

.team-events:last-child {
    margin-bottom: 0;
}

.team-event {
    font-size: 0.85rem;
    margin: 0;
    padding: 6px 8px;
    border-radius: 8px;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    line-height: 1.3;
}

.event-goal {
    background: #dcfce7;
    color: #166534;
}

.event-assist {
    background: #dbeafe;
    color: #1d4ed8;
}

.event-yellow {
    background: #fef9c3;
    color: #92400e;
}

.event-red {
    background: #fee2e2;
    color: #991b1b;
}

.event-sub {
    background: #ede9fe;
    color: #5b21b6;
}

.loading-matches {
    grid-column: 1 / -1;
    text-align: center;
    padding: 30px 20px;
    color: #64748b;
}

.venue {
    font-size: 0.95rem;
    color: #475569;
    margin-top: 6px;
}

.no-matches-text {
    text-align: center;
    color: #475569;
    font-size: 1rem;
    padding: 24px;
}

footer {
    padding: 20px 20px 40px;
    margin-top: 10px;
    text-align: center;
    color: #64748b;
}

@media (max-width: 1024px) {
    .matches-container {
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    }
}

@media (max-width: 768px) {
    .matches-container {
        grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
        gap: 10px;
        padding: 0 10px 25px;
    }

    .match-card {
        padding: 10px;
    }
}

@media (max-width: 600px) {
    .header-top,
    nav ul {
        padding: 0 16px;
    }

    nav ul {
        gap: 12px;
        font-size: 0.9rem;
    }

    .matches-header h2 {
        font-size: 22px;
    }

    .matches-header p {
        font-size: 13px;
    }

    .matches-filters {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        padding: 0 10px;
    }

    .matches-filters button {
        width: 100%;
        padding: 6px 10px;
        font-size: 0.85rem;
    }

    .match-card {
        padding: 10px;
        border-radius: 12px;
    }

    .match-date {
        font-size: 0.8rem;
    }

    .match-score {
        font-size: 1.1rem;
    }

    .team-name {
        font-size: 0.85rem;
    }

    .team-event {
        font-size: 0.8rem;
        padding: 5px 6px;
    }
}

</style>
</head>
<body>
<header>
    <div class="header-top">
        <h1>Tango Football Club</h1>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="technical-team.html">Technical Team</a></li>
            <li><a href="roster.html">Player Roster</a></li>
            <li><a href="matches.html">Matches</a></li>
            <li><a href="history.html">Club History</a></li>
            <li><a href="videos.html">Videos</a></li>
            <li><a href="gallery.html">Gallery</a></li>
        </ul>
    </nav>
</header>

<main>
<section class="matches-header">
    <h2>⚽ Matches & Fixtures</h2>
    <p>Season 2025-2026</p>
    <div class="season-badge"><span>🏆 Current Season</span></div>
</section>

<section class="matches-filters">
    <button class="match-filter-btn active" data-filter="all">All Matches</button>
    <button class="match-filter-btn" data-filter="upcoming">Upcoming</button>
    <button class="match-filter-btn" data-filter="completed">Completed</button>
    <button id="refreshMatches" title="Refresh matches">🔄 Refresh</button>
</section>

<div class="matches-container" id="matchesContainer"></div>
</main>

<footer>
    <p>&copy; 2026 Tango Football Club</p>
</footer>

<script src="js/theme.js"></script>
<script src="js/matches.js"></script>
</body>
</html>
