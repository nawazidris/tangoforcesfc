<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Matches & Fixtures - Tango Football Club</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>

    :root {
    --primary: #002b5c;
    --accent: #0ea5e9;
    --background: #ffffff;

    /* 🔥 FIX: ADD MISSING VARIABLES */
    --header-bg: rgba(0, 43, 92, 0.95);
    --header-text: #ffffff;
    --nav-hover: rgba(14, 165, 233, 0.2);
}

/* DARK MODE */

body.dark-mode {
    --bg-color: #0f172a;
    --text-color: #f1f5f9;
    --card-bg: #1e293b;
    --goal-color: #22c55e;
    --yellow-card: #facc15;
    --red-card: #ef4444;
}

:root[data-theme="light"] {
    --bg-color: #ffffff;
    --text-color: #0b1724;
    --card-bg: #ffffff;
    --header-bg: #002b4f;
    --header-text: #ffffff;
    --nav-hover: #001f3a;
    --secondary-bg: #f0f4f8;
}

:root[data-theme="dark"] {
    --bg-color: #0b0f14;
    --text-color: #e6eef6;
    --card-bg: #0f1720;
    --header-bg: #00131f;
    --header-text: #e6eef6;
    --nav-hover: #003a66;
    --secondary-bg: #0b1220;
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

html {
    scroll-behavior: smooth;
}
/* ===== BODY ===== */
body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.6;

    transition: background-color 0.3s, color 0.3s;
    letter-spacing: -0.3px;

    color: var(--text-color);
    background-color: var(--bg-color);
}



/* ===== HEADER ===== */
header {
    position: sticky;
    z-index: 100;
    top: 0;

    color: var(--header-text);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    background-color: var(--header-bg);

    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
}

.header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;

    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
    padding: 16px 20px;
}

.header-top h1 {
    font-size: 20px;
    font-weight: 600;
}

nav {
    padding: 0 20px 10px 20px;
}



nav ul {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;

    max-width: 1200px;
    margin: 0 auto;

    list-style: none;

    gap: 25px;
}

nav ul li {
    margin-right: 15px;
}

nav ul li a {
    color: white;
    text-decoration: none;
    font-weight: bold;
}

nav ul li a:hover {
    text-decoration: underline;
}

/* ===== MATCHES HEADER ===== */
.matches-header {
    text-align: center;
    padding: 20px;
}

.matches-header h2 {
    font-size: 28px;
}

.matches-header p {
    font-size: 16px;
    color: #555;
}

.season-badge span {
    background: #5903c9;
    color: white;
    padding: 5px 12px;
    border-radius: 15px;
    font-weight: bold;
}

/* ===== FILTER BUTTONS ===== */
.matches-filters {
    text-align: center;
    margin-bottom: 20px;
}

.matches-filters button {
    margin: 5px;
    padding: 8px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    background: #5903c9;
    color: white;
    font-weight: bold;
}

.matches-filters button.active {
    background: #555;
}

.matches-filters button:hover {
    background: #555;
}

/* ===== MATCH CARDS ===== */
.matches-container {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
    padding: 0 20px 40px;
}

.match-card {
    background: white;
    width: 320px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    padding: 15px;
    transition: transform 0.2s;
}

.match-card:hover {
    transform: translateY(-3px);
}

.match-date {
    font-weight: bold;
    margin-bottom: 10px;
    text-align: center;
}

.match-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
}

.team {
    flex: 1;
    text-align: center;
}

.team span {
    display: block;
    font-weight: bold;
    margin-bottom: 5px;
}

.vs {
    flex: 0 0 50px;
    text-align: center;
    font-weight: bold;
    font-size: 18px;
}

.venue {
    font-size: 14px;
    color: #555;
    text-align: center;
}

/* ===== EVENTS ===== */
.team-events {
    text-align: left;
    margin-top: 5px;
}

.team-event {
    font-size: 13px;
    background: #f0f0f0;
    margin: 2px 0;
    padding: 3px 6px;
    border-radius: 5px;
    display: flex;
    align-items: center;
    gap: 5px;
}

.team-event span {
    font-weight: bold;
}

/* COLORS FOR EVENTS */
.team-event:contains("⚽") { color: green; }
.team-event:contains("🎯") { color: blue; }
.team-event:contains("🟨") { color: orange; }
.team-event:contains("🟥") { color: red; }
.team-event:contains("🔁") { color: purple; }


</style>
</head>
<body>
<header>
    <div class="header-top">
        <h1>Tango Football Club</h1>
    </div>
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="technical-team.html">Technical Team</a></li>
            <li><a href="roster.html">Player Roster</a></li>
            <li><a href="matches.html">Matches</a></li>
            <li><a href="history.html">Club History</a></li>
            <li><a href="videos.html">Videos</a></li>
            <li><a href="gallery.html">Gallery</a></li>
        </ul>
    </nav>
</header>

<main>
<section class="matches-header">
    <h2>⚽ Matches & Fixtures</h2>
    <p>Season 2025-2026</p>
    <div class="season-badge"><span>🏆 Current Season</span></div>
</section>

<section class="matches-filters">
    <button class="match-filter-btn active" data-filter="all">All Matches</button>
    <button class="match-filter-btn" data-filter="upcoming">Upcoming</button>
    <button class="match-filter-btn" data-filter="completed">Completed</button>
    <button id="refreshMatches" title="Refresh matches">🔄 Refresh</button>
</section>

<div class="matches-container" id="matchesContainer"></div>
</main>

<footer>
    <p>&copy; 2026 Tango Football Club</p>
</footer>

<script src="js/theme.js"></script>
<script src="js/matches.js"></script>
</body>
</html>
